<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Extractor</title>
  <style>
    :root {
      --bg: #f3f6fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --border: #dbe3ee;
      --error-bg: #fee2e2;
      --error-text: #991b1b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(circle at top left, #e8efff, var(--bg) 45%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .card {
      width: min(100%, 680px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 12px 30px rgba(31, 41, 55, 0.08);
      padding: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.5rem, 2.4vw, 2rem);
      letter-spacing: 0.2px;
      text-align: center;
    }

    .subtitle {
      margin: 0 0 20px;
      color: var(--muted);
      text-align: center;
      font-size: 0.95rem;
    }

    .controls {
      display: grid;
      gap: 12px;
    }

    input[type="file"] {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #f8fafc;
      font-size: 0.95rem;
      color: var(--text);
    }

    button {
      border: none;
      border-radius: 12px;
      background: var(--primary);
      color: white;
      padding: 12px 16px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s ease, transform 0.1s ease;
    }

    button:hover:not(:disabled) {
      background: var(--primary-hover);
    }

    button:active:not(:disabled) {
      transform: translateY(1px);
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .status {
      min-height: 24px;
      margin-top: 8px;
      font-size: 0.92rem;
      color: var(--muted);
    }

    .status.error {
      color: var(--error-text);
      background: var(--error-bg);
      border-radius: 10px;
      padding: 8px 10px;
    }

    .result-label {
      margin: 18px 0 8px;
      font-weight: 600;
      font-size: 0.95rem;
    }

    .result-box {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fbfdff;
      padding: 12px;
      height: 260px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.45;
      font-size: 0.93rem;
    }

    @media (max-width: 480px) {
      .card {
        padding: 18px;
        border-radius: 14px;
      }

      .result-box {
        height: 220px;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>PDF Extractor</h1>
    <p class="subtitle">Upload a PDF and extract text from the backend API.</p>

    <section class="controls">
      <input id="pdfFile" type="file" accept="application/pdf" />
      <button id="uploadBtn" type="button">Upload PDF</button>
    </section>

    <p id="status" class="status"></p>

    <p class="result-label">Extracted Text</p>
    <div id="result" class="result-box">No result yet.</div>
  </main>

  <script>
    const endpoint = "https://back-end-serveur-1.onrender.com/upload";

    const fileInput = document.getElementById("pdfFile");
    const uploadBtn = document.getElementById("uploadBtn");
    const statusText = document.getElementById("status");
    const resultBox = document.getElementById("result");

    function setLoading(isLoading) {
      uploadBtn.disabled = isLoading;
      uploadBtn.textContent = isLoading ? "Uploading..." : "Upload PDF";
      if (isLoading) {
        statusText.classList.remove("error");
        statusText.textContent = "Uploading and extracting text, please wait...";
      }
    }

    function showError(message) {
      statusText.classList.add("error");
      statusText.textContent = message;
    }

    uploadBtn.addEventListener("click", async () => {
      const file = fileInput.files[0];

      if (!file) {
        showError("Please select a PDF file before uploading.");
        return;
      }

      if (file.type !== "application/pdf") {
        showError("Only PDF files are supported.");
        return;
      }

      const formData = new FormData();
      formData.append("file", file);

      try {
        setLoading(true);
        resultBox.textContent = "Waiting for extracted text...";

        const response = await fetch(endpoint, {
          method: "POST",
          body: formData,
        });

        let data;
        try {
          data = await response.json();
        } catch {
          throw new Error("Invalid JSON response from server.");
        }

        if (!response.ok) {
          throw new Error(data?.message || `API error (${response.status}).`);
        }

        if (data.status !== "ok" || typeof data.content !== "string") {
          throw new Error("Unexpected API response format.");
        }

        statusText.classList.remove("error");
        statusText.textContent = "Extraction completed successfully.";
        resultBox.textContent = data.content || "No text content returned by API.";
      } catch (error) {
        resultBox.textContent = "No result yet.";
        showError(error.message || "Network error. Please try again.");
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
