<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF to Word Converter</title>
  <style>
    :root {
      --bg: #eef3ff;
      --card-bg: #ffffff;
      --text: #1f2a44;
      --muted: #6b7280;
      --border: #dbe4ff;
      --success-bg: #e8f7ed;
      --success-text: #166534;
      --error-bg: #fee2e2;
      --error-text: #b91c1c;
      --gradient-start: #3b82f6;
      --gradient-end: #1d4ed8;
      --shadow: 0 18px 45px rgba(29, 78, 216, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top left, #dbe9ff 0%, var(--bg) 40%, #f8faff 100%);
    }

    .card {
      width: min(100%, 480px);
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 28px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(1.4rem, 2.7vw, 2rem);
      text-align: center;
      letter-spacing: 0.2px;
    }

    .subtitle {
      margin: 0 0 22px;
      color: var(--muted);
      text-align: center;
      font-size: 0.95rem;
    }

    .form-group {
      display: grid;
      gap: 14px;
    }

    .file-input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      font-size: 0.95rem;
      color: var(--text);
      background: #f8faff;
    }

    .convert-btn {
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
      box-shadow: 0 10px 20px rgba(59, 130, 246, 0.26);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .convert-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 14px 24px rgba(59, 130, 246, 0.32);
      filter: brightness(1.04);
    }

    .convert-btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .convert-btn:disabled {
      opacity: 0.75;
      cursor: not-allowed;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2.5px solid rgba(255, 255, 255, 0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    .convert-btn.loading .spinner {
      display: inline-block;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .message {
      margin-top: 16px;
      min-height: 42px;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 0.92rem;
      display: none;
      line-height: 1.4;
    }

    .message.success {
      display: block;
      background: var(--success-bg);
      color: var(--success-text);
    }

    .message.error {
      display: block;
      background: var(--error-bg);
      color: var(--error-text);
    }

    @media (max-width: 520px) {
      body {
        padding: 14px;
      }

      .card {
        padding: 20px;
        border-radius: 16px;
      }

      .convert-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>PDF to Word Converter</h1>
    <p class="subtitle">Upload your PDF and get a Word (.docx) file in seconds.</p>

    <div class="form-group">
      <input id="pdfInput" class="file-input" type="file" accept="application/pdf,.pdf" />

      <button id="convertBtn" class="convert-btn" type="button">
        <span class="spinner" aria-hidden="true"></span>
        <span id="buttonLabel">Convert</span>
      </button>
    </div>

    <p id="message" class="message" role="status" aria-live="polite"></p>
  </main>

  <script>
    const API_ENDPOINT = "https://back-end-serveur-1.onrender.com/convert";

    const pdfInput = document.getElementById("pdfInput");
    const convertBtn = document.getElementById("convertBtn");
    const buttonLabel = document.getElementById("buttonLabel");
    const message = document.getElementById("message");

    function setLoading(isLoading) {
      convertBtn.disabled = isLoading;
      convertBtn.classList.toggle("loading", isLoading);
      buttonLabel.textContent = isLoading ? "Converting..." : "Convert";
    }

    function showMessage(type, text) {
      message.className = "message";
      if (type) {
        message.classList.add(type);
      }
      message.textContent = text || "";
    }

    function buildOutputName(filename) {
      const baseName = filename.replace(/\.pdf$/i, "") || "converted-file";
      return `${baseName}.docx`;
    }

    async function convertPdf() {
      const file = pdfInput.files[0];

      if (!file) {
        showMessage("error", "Please select a PDF file first.");
        return;
      }

      if (file.type && file.type !== "application/pdf") {
        showMessage("error", "Invalid file type. Please upload a PDF.");
        return;
      }

      const formData = new FormData();
      formData.append("file", file);

      try {
        setLoading(true);
        showMessage(null, "");

        const response = await fetch(API_ENDPOINT, {
          method: "POST",
          body: formData,
        });

        if (!response.ok) {
          let errorText = `Conversion failed (HTTP ${response.status}).`;
          try {
            const maybeJson = await response.json();
            if (maybeJson?.message) {
              errorText = maybeJson.message;
            }
          } catch {
            // Keep default error text if response isn't JSON.
          }
          throw new Error(errorText);
        }

        const blob = await response.blob();
        const downloadUrl = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = downloadUrl;
        a.download = buildOutputName(file.name);
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(downloadUrl);

        showMessage("success", "Conversion successful! Your .docx file has been downloaded.");
      } catch (error) {
        showMessage("error", error.message || "An unexpected error occurred. Please try again.");
      } finally {
        setLoading(false);
      }
    }

    convertBtn.addEventListener("click", convertPdf);
  </script>
</body>
</html>
