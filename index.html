<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transfert de fichiers</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <section class="card" aria-labelledby="main-title">
        <h1 id="main-title">Transfert de fichiers</h1>
        <p class="subtitle">Glissez-déposez un fichier ou sélectionnez-le depuis votre appareil.</p>

        <form id="uploadForm" class="upload-form" novalidate>
          <label id="dropZone" class="drop-zone" for="fileInput">
            <input id="fileInput" name="file" type="file" />
            <span class="drop-zone__title">Déposer un fichier ici</span>
            <span class="drop-zone__hint">ou cliquer pour choisir un fichier</span>
            <span id="selectedFile" class="selected-file" aria-live="polite">Aucun fichier sélectionné</span>
          </label>

          <button id="uploadBtn" class="btn btn-primary" type="submit">Envoyer</button>
        </form>

        <div id="statusMessage" class="status" role="status" aria-live="polite"></div>

        <div id="progressWrap" class="progress-wrap" aria-hidden="true">
          <div id="progressBar" class="progress-bar"></div>
        </div>

        <section id="result" class="result hidden" aria-live="polite">
          <p class="success">Fichier envoyé avec succès</p>
          <div class="link-row">
            <a id="downloadLink" href="#" target="_blank" rel="noopener noreferrer"></a>
            <button id="copyBtn" class="btn btn-secondary" type="button">Copier le lien</button>
          </div>
        </section>

        <section class="tool-section" aria-labelledby="excel-title">
          <h2 id="excel-title">Transformer un Excel en JSON</h2>
          <p class="subtitle tool-subtitle">Importez un fichier Excel puis téléchargez automatiquement le JSON généré.</p>

          <form id="excelForm" class="upload-form" novalidate>
            <label class="file-picker" for="excelInput">
              <input id="excelInput" name="file" type="file" accept=".xlsx,.xls" />
              <span class="file-picker__label">Sélectionner un fichier Excel (.xlsx, .xls)</span>
            </label>
            <span id="excelSelectedFile" class="selected-file" aria-live="polite">Aucun fichier sélectionné</span>
            <button id="excelBtn" class="btn btn-primary" type="submit">Transformer en JSON</button>
          </form>

          <div id="excelStatus" class="status" role="status" aria-live="polite"></div>
        </section>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
